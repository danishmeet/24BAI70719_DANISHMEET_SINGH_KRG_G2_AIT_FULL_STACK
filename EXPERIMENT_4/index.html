<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exp 4 - Job Posting Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Post a Job</h1>
        <form id="jobForm">
            <div class="form-group">
                <label for="jobTitle">Job Title</label>
                <input type="text" id="jobTitle" required placeholder="e.g. Software Engineer">
            </div>

            <div class="form-group">
                <label for="companyName">Company Name</label>
                <input type="text" id="companyName" required placeholder="e.g. Tech Corp">
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" required placeholder="e.g. Remote / New York">
            </div>

            <div class="form-group">
                <label for="description">Job Description</label>
                <textarea id="description" rows="4" required placeholder="Brief description of the role..."></textarea>
            </div>

            <button type="submit">Submit Job</button>
        </form>

        <h2>Job Listings</h2>
        <div id="jobContainer" class="job-container">
            
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
